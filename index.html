<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>An intelligence test</title>
  <meta name="description" content="Twenty problems, one minute each. Questions adapt to your age — from arithmetic and sequences to classic IQ-test trick questions." />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='none' stroke='%23c4795a' stroke-width='2'/%3E%3Ccircle cx='12' cy='12' r='3' fill='%23c4795a'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />

  <script>
    /* Cache-bust our own stylesheets so CSS edits land without a hard reload */
    (function(){
      const v = Date.now();
      ["css/tokens.css","css/base.css","css/components.css","css/test.css"].forEach(href => {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = href + "?v=" + v;
        document.head.appendChild(link);
      });
    })();
  </script>
</head>
<body>
  <div class="landing">

    <main class="landing__hero">
      <section class="landing__copy">
        <h1 class="landing__title reveal" style="--i:0;">
          An <em>intelligence</em><br />test.
        </h1>

        <p class="landing__subtitle reveal" style="--i:1;">
          Twenty problems, one minute each. Questions adapt to your age — arithmetic, sequences, analogies, and classic IQ trick questions.
        </p>


        <div class="landing__age reveal" style="--i:2;">
          <label class="landing__age-label" for="age-input">Your age</label>
          <div class="landing__age-row">
            <input type="number" id="age-input" class="landing__age-input"
                   min="8" max="99" step="1" inputmode="numeric"
                   placeholder="14" autocomplete="off" />
            <span class="landing__age-hint" id="age-hint">Questions adapt to your age.</span>
          </div>
        </div>

        <div class="landing__cta reveal" style="--i:3;">
          <button class="btn btn--primary" id="start-btn" disabled>
            Begin assessment
          </button>
          <input type="hidden" id="seed-input" maxlength="7" />
        </div>
      </section>

      <aside class="landing__hero-art reveal" style="--i:2;" aria-hidden="true">

        <!-- Shared depth filter — subtle drop shadow for "not flat" feel -->
        <svg width="0" height="0" style="position:absolute" aria-hidden="true">
          <defs>
            <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
              <feOffset dx="0" dy="3" result="offsetblur"/>
              <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3"/>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
        </svg>

        <!-- ═══════════ Scene A · Pick the answer (Matrix Reasoning) ═══════════ -->
        <svg class="puzzle-scene puzzle-scene--a" viewBox="0 0 300 300" role="presentation">
          <!-- Crosshair ticks -->
          <g stroke="var(--hairline-strong)" stroke-width="1">
            <line x1="0" y1="150" x2="300" y2="150" stroke-dasharray="2 5" opacity="0.5"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke-dasharray="2 5" opacity="0.5"/>
          </g>

          <!-- 3×3 preview grid, 120×120, centered top -->
          <g stroke="var(--border-strong)" stroke-width="1" fill="var(--surface)">
            <rect x="90"  y="30"  width="40" height="40" rx="1"/>
            <rect x="130" y="30"  width="40" height="40" rx="1"/>
            <rect x="170" y="30"  width="40" height="40" rx="1"/>
            <rect x="90"  y="70"  width="40" height="40" rx="1"/>
            <rect x="130" y="70"  width="40" height="40" rx="1"/>
            <rect x="170" y="70"  width="40" height="40" rx="1"/>
            <rect x="90"  y="110" width="40" height="40" rx="1"/>
            <rect x="130" y="110" width="40" height="40" rx="1"/>
            <rect x="170" y="110" width="40" height="40" rx="1" stroke-dasharray="2 2" class="scene-a__slot"/>
          </g>

          <!-- Preview shapes (rows by shape type, cols by fill) -->
          <g fill="none" stroke="var(--text-secondary)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round">
            <!-- Row 1: triangles -->
            <polygon points="110,42 120,58 100,58"/>
            <polygon points="150,42 160,58 140,58"/>
            <polygon points="190,42 200,58 180,58" fill="var(--text-secondary)" fill-opacity="0.25"/>
            <!-- Row 2: circles -->
            <circle cx="110" cy="90" r="8"/>
            <circle cx="150" cy="90" r="8"/>
            <circle cx="190" cy="90" r="8" fill="var(--text-secondary)" fill-opacity="0.25"/>
            <!-- Row 3: squares (answer slot = filled square) -->
            <rect x="102" y="122" width="16" height="16" rx="1"/>
            <rect x="142" y="122" width="16" height="16" rx="1"/>
            <!-- Filled square appears in the slot once the cursor clicks -->
            <rect class="scene-a__answer-in-slot" x="182" y="122" width="16" height="16" rx="1"
                  fill="var(--accent)" fill-opacity="0.25" stroke="var(--accent)" opacity="0"/>
          </g>

          <!-- "?" mark that lives in the slot until answered -->
          <text class="scene-a__q" x="190" y="138" font-family="Sora, sans-serif" font-size="20" font-weight="300"
                fill="var(--text-muted)" text-anchor="middle">?</text>

          <!-- Answer options row -->
          <g class="scene-a__options">
            <!-- Option cards (50×50) -->
            <g stroke="var(--border-strong)" stroke-width="1" fill="var(--surface)">
              <rect x="30"  y="200" width="50" height="50" rx="3"/>
              <rect x="95"  y="200" width="50" height="50" rx="3"/>
              <rect x="160" y="200" width="50" height="50" rx="3" class="scene-a__correct"/>
              <rect x="225" y="200" width="50" height="50" rx="3"/>
            </g>
            <!-- Option shapes -->
            <g fill="none" stroke="var(--text-secondary)" stroke-width="1.4" stroke-linejoin="round">
              <circle cx="55" cy="225" r="10"/>
              <polygon points="120,213 132,225 120,237 108,225"/>
              <!-- Correct: filled square (matches pattern row 3) -->
              <rect x="175" y="215" width="20" height="20" rx="1" fill="var(--accent)" fill-opacity="0.25" stroke="var(--accent)"/>
              <polygon points="250,215 261,235 239,235"/>
            </g>
            <!-- Option letters -->
            <g font-family="Geist Mono, monospace" font-size="9" fill="var(--text-faint)" letter-spacing="1.5">
              <text x="34" y="264">A</text>
              <text x="99" y="264">B</text>
              <text x="164" y="264" class="scene-a__correct-letter">C</text>
              <text x="229" y="264">D</text>
            </g>
          </g>

          <!-- Click ripple -->
          <circle class="scene-a__ripple" cx="185" cy="225" r="0" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0"/>

          <!-- Cursor -->
          <g class="scene-cursor scene-cursor--a">
            <path d="M0,0 L0,18 L5,14 L9,22 L12,21 L8,13 L14,13 Z" fill="var(--text)" stroke="var(--bg-solid)" stroke-width="0.8" stroke-linejoin="round"/>
          </g>
        </svg>

        <!-- ═══════════ Scene B · Drag-rotate (Mental Rotation) ═══════════ -->
        <svg class="puzzle-scene puzzle-scene--b" viewBox="0 0 300 300" role="presentation">
          <!-- Crosshair -->
          <g stroke="var(--hairline-strong)" stroke-width="1">
            <line x1="0" y1="150" x2="300" y2="150" stroke-dasharray="2 5" opacity="0.5"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke-dasharray="2 5" opacity="0.5"/>
          </g>

          <!-- Concentric degree guide (bigger, two rings for depth) -->
          <circle cx="150" cy="150" r="118" fill="none" stroke="var(--hairline-strong)" stroke-width="1" stroke-dasharray="1 5"/>
          <circle cx="150" cy="150" r="95"  fill="none" stroke="var(--hairline)"        stroke-width="1" stroke-dasharray="1 4"/>

          <!-- Target outline (where the shape should end up) -->
          <g transform-origin="150 150">
            <polygon class="scene-b__target"
              points="150,55 205,115 190,205 110,205 95,115"
              fill="none" stroke="var(--border-strong)" stroke-dasharray="4 4" stroke-width="1.2"/>
          </g>

          <!-- Draggable shape (same polygon, coral, rotates) -->
          <polygon class="scene-b__shape"
            points="150,55 205,115 190,205 110,205 95,115"
            fill="var(--accent-dim)" fill-opacity="0.35" stroke="var(--accent)" stroke-width="2.2"
            stroke-linejoin="round"/>

          <!-- Lock-in flash (full-circle pulse when aligned) -->
          <circle class="scene-b__lock" cx="150" cy="150" r="105" fill="none" stroke="var(--ok)" stroke-width="1.8" opacity="0"/>

          <!-- Checkmark that appears on lock-in -->
          <path class="scene-b__check"
            d="M232 148 l9 9 l18 -20"
            fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>

          <!-- Drag trail (arc, hints at the gesture) -->
          <path class="scene-b__trail"
            d="M 240 90 A 110 110 0 0 1 258 175"
            fill="none" stroke="var(--accent)" stroke-width="1.2" stroke-dasharray="3 3" opacity="0"/>

          <!-- Cursor -->
          <g class="scene-cursor scene-cursor--b">
            <path d="M0,0 L0,18 L5,14 L9,22 L12,21 L8,13 L14,13 Z" fill="var(--text)" stroke="var(--bg-solid)" stroke-width="0.8" stroke-linejoin="round"/>
          </g>
        </svg>

        <!-- ═══════════ Scene C · Draw pattern (Pattern Sequence) ═══════════ -->
        <svg class="puzzle-scene puzzle-scene--c" viewBox="0 0 300 300" role="presentation">
          <!-- Crosshair -->
          <g stroke="var(--hairline-strong)" stroke-width="1">
            <line x1="0" y1="150" x2="300" y2="150" stroke-dasharray="2 5" opacity="0.5"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke-dasharray="2 5" opacity="0.5"/>
          </g>

          <!-- 5×5 dot grid, 40px spacing, centered, starts (70,70) ends (230,230) -->
          <g class="scene-c__dots" fill="var(--text-faint)">
            <circle cx="70"  cy="70"  r="2"/>  <circle cx="110" cy="70"  r="2"/>  <circle cx="150" cy="70"  r="2"/>  <circle cx="190" cy="70"  r="2"/>  <circle cx="230" cy="70"  r="2"/>
            <circle cx="70"  cy="110" r="2"/>  <circle cx="110" cy="110" r="2"/>  <circle cx="150" cy="110" r="2"/>  <circle cx="190" cy="110" r="2"/>  <circle cx="230" cy="110" r="2"/>
            <circle cx="70"  cy="150" r="2"/>  <circle cx="110" cy="150" r="2"/>  <circle cx="150" cy="150" r="2"/>  <circle cx="190" cy="150" r="2"/>  <circle cx="230" cy="150" r="2"/>
            <circle cx="70"  cy="190" r="2"/>  <circle cx="110" cy="190" r="2"/>  <circle cx="150" cy="190" r="2"/>  <circle cx="190" cy="190" r="2"/>  <circle cx="230" cy="190" r="2"/>
            <circle cx="70"  cy="230" r="2"/>  <circle cx="110" cy="230" r="2"/>  <circle cx="150" cy="230" r="2"/>  <circle cx="190" cy="230" r="2"/>  <circle cx="230" cy="230" r="2"/>
          </g>

          <!-- Highlighted dots along the drawn path (pulse as cursor passes) -->
          <g fill="var(--accent)">
            <circle class="scene-c__dot scene-c__dot-1" cx="70"  cy="70"  r="3" opacity="0"/>
            <circle class="scene-c__dot scene-c__dot-2" cx="150" cy="70"  r="3" opacity="0"/>
            <circle class="scene-c__dot scene-c__dot-3" cx="150" cy="150" r="3" opacity="0"/>
            <circle class="scene-c__dot scene-c__dot-4" cx="230" cy="150" r="3" opacity="0"/>
            <circle class="scene-c__dot scene-c__dot-5" cx="230" cy="230" r="3" opacity="0"/>
          </g>

          <!-- The drawn path — stroke-dashoffset reveals it in sync with cursor -->
          <path class="scene-c__path"
            d="M 70 70 L 150 70 L 150 150 L 230 150 L 230 230"
            fill="none" stroke="var(--accent)" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"
            pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>

          <!-- Cursor traces the path -->
          <g class="scene-cursor scene-cursor--c">
            <path d="M0,0 L0,18 L5,14 L9,22 L12,21 L8,13 L14,13 Z" fill="var(--text)" stroke="var(--bg-solid)" stroke-width="0.8" stroke-linejoin="round"/>
          </g>
        </svg>

        <!-- ═══════════ Scene D · Paper Folding ═══════════ -->
        <svg class="puzzle-scene puzzle-scene--d" viewBox="0 0 300 300" role="presentation">
          <!-- Crosshair -->
          <g stroke="var(--hairline-strong)" stroke-width="1">
            <line x1="0" y1="150" x2="300" y2="150" stroke-dasharray="2 5" opacity="0.5"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke-dasharray="2 5" opacity="0.5"/>
          </g>

          <!-- Paper platform shadow (depth) -->
          <ellipse class="fold-shadow" cx="150" cy="245" rx="70" ry="6" fill="rgba(0,0,0,0.45)" filter="url(#glow)"/>

          <!-- Left half of paper (static) -->
          <rect class="fold-left" x="90" y="80" width="60" height="140" rx="3"
            fill="var(--surface-raised)" stroke="var(--border-strong)" stroke-width="1"/>

          <!-- Right half (folds across the center crease) -->
          <g class="fold-right" transform-origin="150px 150px">
            <rect x="150" y="80" width="60" height="140" rx="3"
              fill="var(--surface-raised)" stroke="var(--border-strong)" stroke-width="1"/>
            <!-- Inner highlight for paper depth -->
            <rect x="154" y="84" width="52" height="132" rx="2"
              fill="none" stroke="var(--hairline-strong)" stroke-width="1"/>
          </g>

          <!-- Crease line -->
          <line class="fold-crease" x1="150" y1="75" x2="150" y2="225" stroke="var(--accent)"
            stroke-width="1" stroke-dasharray="3 3" opacity="0"/>

          <!-- The punched hole (primary side — appears while folded) -->
          <circle class="fold-hole-primary" cx="175" cy="130" r="7"
            fill="var(--bg-solid)" stroke="var(--accent)" stroke-width="1.5" opacity="0"/>

          <!-- The mirrored hole (appears when paper unfolds) -->
          <circle class="fold-hole-mirror" cx="125" cy="130" r="7"
            fill="var(--bg-solid)" stroke="var(--accent)" stroke-width="1.5" opacity="0"/>

          <!-- Click ripple at hole punch -->
          <circle class="fold-ripple" cx="175" cy="130" r="0" fill="none"
            stroke="var(--accent)" stroke-width="1.5" opacity="0"/>

          <!-- Cursor -->
          <g class="scene-cursor scene-cursor--d">
            <path d="M0,0 L0,18 L5,14 L9,22 L12,21 L8,13 L14,13 Z" fill="var(--text)" stroke="var(--bg-solid)" stroke-width="0.8" stroke-linejoin="round"/>
          </g>
        </svg>

        <!-- ═══════════ Scene E · Cube Net → Cube ═══════════ -->
        <svg class="puzzle-scene puzzle-scene--e" viewBox="0 0 300 300" role="presentation">
          <!-- Crosshair -->
          <g stroke="var(--hairline-strong)" stroke-width="1">
            <line x1="0" y1="150" x2="300" y2="150" stroke-dasharray="2 5" opacity="0.5"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke-dasharray="2 5" opacity="0.5"/>
          </g>

          <!-- Flat cross-net (visible first, fades out as cube assembles) -->
          <g class="cube-net">
            <g stroke="var(--border-strong)" stroke-width="1" fill="var(--surface-raised)">
              <rect x="120" y="55"  width="60" height="60" rx="2"/>            <!-- top square -->
              <rect x="60"  y="115" width="60" height="60" rx="2"/>            <!-- left -->
              <rect x="120" y="115" width="60" height="60" rx="2"/>            <!-- center (front) -->
              <rect x="180" y="115" width="60" height="60" rx="2"/>            <!-- right -->
              <rect x="120" y="175" width="60" height="60" rx="2"/>            <!-- bottom -->
              <rect x="120" y="235" width="60" height="60" rx="2"/>            <!-- back -->
            </g>
            <!-- Face symbols -->
            <g fill="none" stroke="var(--text-secondary)" stroke-width="1.4" stroke-linejoin="round">
              <circle cx="150" cy="85" r="8"/>
              <rect x="82"  y="137" width="16" height="16" rx="1"/>
              <polygon points="150,132 160,152 140,152"/>
              <polygon points="210,137 218,145 210,153 202,145"/>
              <path d="M142 202 l8 8 l-8 8 M158 202 l-8 8 l8 8"/>
              <circle cx="150" cy="265" r="4" fill="var(--accent)" stroke="var(--accent)"/>
            </g>
          </g>

          <!-- Isometric cube (fades in after net collapses)
               Top face rhombus: (80,130)-(150,95)-(220,130)-(150,165)
               Cube height on screen = 85px, so front-bottom is at (150, 250) -->
          <g class="cube-solid" transform-origin="150px 170px">
            <!-- Right face (mid-light) -->
            <polygon points="150,165 220,130 220,215 150,250"
              fill="var(--surface-raised)" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- Left face (mid) -->
            <polygon points="80,130 150,165 150,250 80,215"
              fill="var(--surface)" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- Top face (lightest with accent tint) -->
            <polygon points="80,130 150,95 220,130 150,165"
              fill="var(--accent-faint)" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- Top face symbol (circle) -->
            <circle cx="150" cy="130" r="7" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
            <!-- Right face symbol (diamond) -->
            <polygon points="185,195 196,206 185,217 174,206" fill="none" stroke="var(--text-secondary)" stroke-width="1.3"/>
            <!-- Left face symbol (square) -->
            <rect x="103" y="196" width="18" height="18" rx="1" fill="none" stroke="var(--text-secondary)" stroke-width="1.3"/>
          </g>

          <!-- Cursor -->
          <g class="scene-cursor scene-cursor--e">
            <path d="M0,0 L0,18 L5,14 L9,22 L12,21 L8,13 L14,13 Z" fill="var(--text)" stroke="var(--bg-solid)" stroke-width="0.8" stroke-linejoin="round"/>
          </g>
        </svg>

        <!-- ═══════════ Scene F · Odd One Out ═══════════ -->
        <svg class="puzzle-scene puzzle-scene--f" viewBox="0 0 300 300" role="presentation">
          <!-- Crosshair -->
          <g stroke="var(--hairline-strong)" stroke-width="1">
            <line x1="0" y1="150" x2="300" y2="150" stroke-dasharray="2 5" opacity="0.5"/>
            <line x1="150" y1="0" x2="150" y2="300" stroke-dasharray="2 5" opacity="0.5"/>
          </g>

          <!-- 2×2 card grid -->
          <g stroke="var(--border-strong)" stroke-width="1" fill="var(--surface-raised)">
            <rect class="odd-card odd-card-1" x="55"  y="60"  width="80" height="80" rx="4"/>
            <rect class="odd-card odd-card-2" x="165" y="60"  width="80" height="80" rx="4"/>
            <rect class="odd-card odd-card-3" x="55"  y="170" width="80" height="80" rx="4"/>
            <rect class="odd-card odd-card-4 odd-correct" x="165" y="170" width="80" height="80" rx="4"/>
          </g>

          <!-- Shapes: 3 stars (same) + 1 circle (different) -->
          <g fill="none" stroke="var(--text-secondary)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
            <!-- Star in card 1 -->
            <polygon class="odd-shape-1" points="95,80 101,95 117,96 104,106 108,121 95,112 82,121 86,106 73,96 89,95" transform-origin="95px 100px"/>
            <!-- Star in card 2 -->
            <polygon class="odd-shape-2" points="205,80 211,95 227,96 214,106 218,121 205,112 192,121 196,106 183,96 199,95" transform-origin="205px 100px"/>
            <!-- Star in card 3 -->
            <polygon class="odd-shape-3" points="95,190 101,205 117,206 104,216 108,231 95,222 82,231 86,216 73,206 89,205" transform-origin="95px 210px"/>
            <!-- Circle (odd one out) in card 4 -->
            <circle class="odd-shape-odd" cx="205" cy="210" r="20" stroke-width="1.8"/>
          </g>

          <!-- "?" appears briefly to prompt -->
          <text class="odd-prompt" x="150" y="35" font-family="Sora, sans-serif" font-size="14" font-weight="300"
            fill="var(--text-muted)" text-anchor="middle" letter-spacing="0.1em">WHICH DOESN'T BELONG?</text>

          <!-- X marks on the three "same" cards -->
          <g class="odd-x-marks" stroke="var(--text-faint)" stroke-width="1.4" stroke-linecap="round" opacity="0">
            <path class="odd-x odd-x-1" d="M125 70 l10 10 M135 70 l-10 10"/>
            <path class="odd-x odd-x-2" d="M235 70 l10 10 M245 70 l-10 10"/>
            <path class="odd-x odd-x-3" d="M125 180 l10 10 M135 180 l-10 10"/>
          </g>

          <!-- Click ripple at the odd card -->
          <circle class="odd-ripple" cx="205" cy="210" r="0" fill="none"
            stroke="var(--accent)" stroke-width="1.5" opacity="0"/>

          <!-- Cursor -->
          <g class="scene-cursor scene-cursor--f">
            <path d="M0,0 L0,18 L5,14 L9,22 L12,21 L8,13 L14,13 Z" fill="var(--text)" stroke="var(--bg-solid)" stroke-width="0.8" stroke-linejoin="round"/>
          </g>
        </svg>

        <!-- Progress indicator (6 dots, one active per scene) -->
        <div class="puzzle-progress" aria-hidden="true">
          <span class="puzzle-progress__dot puzzle-progress__dot--a"></span>
          <span class="puzzle-progress__dot puzzle-progress__dot--b"></span>
          <span class="puzzle-progress__dot puzzle-progress__dot--c"></span>
          <span class="puzzle-progress__dot puzzle-progress__dot--d"></span>
          <span class="puzzle-progress__dot puzzle-progress__dot--e"></span>
          <span class="puzzle-progress__dot puzzle-progress__dot--f"></span>
        </div>
      </aside>
    </main>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
